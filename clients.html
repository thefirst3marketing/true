
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — the first three</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --paper-left: #F7F6F2;
            --ink-dark: #1E2420;
            --ink-medium: #4A5D52;
            --ink-light: #8A9A91;
            --jade-accent: #6B8E7B;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--paper-left);
            color: var(--ink-dark);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        .font-eng {
            font-family: 'Cormorant Garamond', serif;
        }

        /* ── app shell ── */
        #app-container {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #app-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── left panel nav ── */
        .nav-item {
            position: relative;
            display: block;
            padding-left: 1rem;
            transition: transform 0.4s ease;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0%;
            background-color: var(--jade-accent);
            transition: height 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .nav-group:hover .nav-item { transform: translateX(10px); }
        .nav-group:hover .nav-item::before { height: 100%; }
        .nav-group:hover .nav-cn { color: var(--ink-dark); }
        .nav-cn {
            color: var(--ink-medium);
            transition: color 0.4s ease;
        }

        /* active state for current page */
        .nav-item.active { transform: translateX(10px); }
        .nav-item.active::before { height: 100%; }
        .nav-item.active .nav-cn { color: var(--ink-dark); }

        /* ── canvas panel ── */
        #canvas-panel {
            position: relative;
            overflow: hidden;
        }
        #webgl-container {
            position: absolute;
            inset: 0;
            z-index: 10;
        }
        #canvas-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 20px 0 40px rgba(0,0,0,0.03);
            z-index: 20;
            pointer-events: none;
        }

        /* ── client logo overlay ── */
        #clients-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .clients-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.78rem;
            letter-spacing: 0.45em;
            color: var(--ink-medium);
            text-transform: uppercase;
            margin-bottom: 56px;
            opacity: 0.7;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 680px;
        }

        .logo-cell {
            background: rgba(247, 246, 242, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(107, 142, 123, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 28px;
            transition: background 0.35s ease, transform 0.35s cubic-bezier(0.19,1,0.22,1);
            cursor: default;
            aspect-ratio: 16/7;
        }

        .logo-cell:hover {
            background: rgba(247, 246, 242, 0.82);
            transform: translateY(-3px);
        }

        /* text-based placeholder logos — replace src with <img> tags when ready */
        .logo-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            letter-spacing: 0.18em;
            color: var(--ink-dark);
            text-align: center;
            opacity: 0.75;
            font-style: italic;
            transition: opacity 0.3s ease;
        }
        .logo-cell:hover .logo-name { opacity: 1; }

        /* staggered fade-in for grid cells */
        .logo-cell {
            opacity: 0;
            animation: cellIn 0.6s ease forwards;
        }
        .logo-cell:nth-child(1) { animation-delay: 0.1s; }
        .logo-cell:nth-child(2) { animation-delay: 0.18s; }
        .logo-cell:nth-child(3) { animation-delay: 0.26s; }
        .logo-cell:nth-child(4) { animation-delay: 0.34s; }
        .logo-cell:nth-child(5) { animation-delay: 0.42s; }
        .logo-cell:nth-child(6) { animation-delay: 0.50s; }
        .logo-cell:nth-child(7) { animation-delay: 0.58s; }
        .logo-cell:nth-child(8) { animation-delay: 0.66s; }
        .logo-cell:nth-child(9) { animation-delay: 0.74s; }

        @keyframes cellIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            max-height: 52px;
            max-width: 140px;
            width: auto;
            object-fit: contain;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            filter: saturate(0);
        }
        .logo-cell:hover .logo-img {
            opacity: 1;
            filter: saturate(1);
        }
        .clients-note {
            margin-top: 56px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.78rem;
            letter-spacing: 0.3em;
            color: var(--ink-light);
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <main id="app-container" class="flex w-full h-full relative">

        <!-- LEFT PANEL -->
        <section class="w-1/3 h-full bg-[#F7F6F2] flex flex-col justify-between p-16 z-20 shadow-[10px_0_30px_rgba(0,0,0,0.02)] relative">
            <div class="mt-8">
                <a href="index.html" class="font-eng text-2xl tracking-wide text-[#1E2420] mb-2 block hover:opacity-60 transition-opacity">the first three</a>
            </div>

            <nav class="flex flex-col gap-10 my-auto ml-4">
                <a href="clients.html" class="nav-group group block cursor-pointer outline-none">
                    <div class="nav-item active">
                        <div class="nav-cn text-xl tracking-[0.2em] mb-1 font-eng italic">Clients</div>
                    </div>
                </a>
                <a href="services.html" class="nav-group group block cursor-pointer outline-none">
                    <div class="nav-item">
                        <div class="nav-cn text-xl tracking-[0.2em] mb-1 font-eng italic">Services</div>
                    </div>
                </a>
                <a href="about.html" class="nav-group group block cursor-pointer outline-none">
                    <div class="nav-item">
                        <div class="nav-cn text-xl tracking-[0.2em] mb-1 font-eng italic">About</div>
                    </div>
                </a>
            </nav>

            <div class="mb-4">
                <div class="text-xs tracking-[0.2em] text-[#8A9A91] flex items-center gap-4"></div>
            </div>
        </section>

        <!-- RIGHT PANEL — jade shader + logo grid -->
        <section id="canvas-panel" class="w-2/3 h-full">
            <div id="webgl-container"></div>

            <div id="clients-overlay">
                <div class="clients-heading">Our Clients</div>
                <div class="logo-grid">

                    <div class="logo-cell"><img src="logos/logo our place.svg" alt="Our Place" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo svdpla.svg" alt="SVDPLA" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo athena.svg" alt="Athena" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo jiang.svg" alt="Jiang" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo germanikure.svg" alt="Germanikure" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo compostic.svg" alt="Compostic" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo cicada.svg" alt="Cicada" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo Prime Roots .svg" alt="Prime Roots" class="logo-img"></div>
                    <div class="logo-cell"><img src="logos/logo osmo.svg" alt="Osmo" class="logo-img"></div>

                </div>
                <div class="clients-note">a selection of brands we've had the privilege of working with</div>
            </div>
        </section>

    </main>

    <script>
        // Fade in on load (no splash on inner pages)
        window.addEventListener('load', () => {
            document.getElementById('app-container').classList.add('visible');
        });

        // ── Jade shader (identical to homepage) ──
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const vertexShader = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;
        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            varying vec2 vUv;

            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
            float snoise(vec2 v){
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy));
                vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod(i, 289.0);
                vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m; m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }
            float fbm(vec2 st) {
                float value = 0.0; float amplitude = 0.5;
                for (int i = 0; i < 6; i++) { value += amplitude * snoise(st); st *= 2.0; amplitude *= 0.5; }
                return value;
            }
            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                st.x *= u_resolution.x / u_resolution.y;
                float time = u_time * 0.04;
                vec2 q = vec2(fbm(st + vec2(time)), fbm(st + vec2(1.0)));
                vec2 r = vec2(fbm(st + 1.2*q + vec2(1.7,9.2) + 0.15*time), fbm(st + 1.2*q + vec2(8.3,2.8) + 0.126*time));
                float f = fbm(st + r);
                vec3 colorBase  = vec3(0.92, 0.94, 0.91);
                vec3 colorDeep  = vec3(0.42, 0.55, 0.48);
                vec3 colorMid   = vec3(0.65, 0.75, 0.70);
                vec3 colorMist  = vec3(0.85, 0.88, 0.86);
                vec3 colorWhite = vec3(0.98, 0.99, 0.98);
                vec3 color = mix(colorBase, colorMist, clamp((f*f)*3.5, 0.0, 1.0));
                color = mix(color, colorMid,   clamp(length(q)*1.2,   0.0, 1.0));
                color = mix(color, colorDeep,  clamp(length(r.x)*1.1, 0.0, 1.0) * 0.5);
                float highlight = smoothstep(0.5, 1.0, f);
                color = mix(color, colorWhite, highlight * 0.6);
                color -= sin(st.y * 150.0 + time * 10.0) * 0.015;
                color -= sin(st.y * 300.0) * 0.01;
                float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) * 0.02;
                color -= grain;
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
        };
        const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

        const clock = new THREE.Clock();
        (function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        })();

        window.addEventListener('resize', () => {
            renderer.setSize(container.clientWidth, container.clientHeight);
            uniforms.u_resolution.value.set(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
