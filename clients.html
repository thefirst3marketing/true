
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — the first three</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #F7F6F2;
            --ink-dark: #1E2420;
            --ink-medium: #4A5D52;
            --ink-light: #8A9A91;
            --jade-accent: #6B8E7B;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--paper);
            color: var(--ink-dark);
            font-family: 'Cormorant Garamond', serif;
            height: 100%;
        }

        /* ── page wrapper ── */
        .page {
            display: flex;
            min-height: 100vh;
            opacity: 0;
            animation: pageIn 0.8s ease forwards 0.1s;
        }
        @keyframes pageIn { to { opacity: 1; } }

        /* ── left panel — sticky sidebar ── */
        .left-panel {
            width: 33.333%;
            min-width: 220px;
            flex-shrink: 0;
            background: var(--paper);
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 64px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        /* ── nav ── */
        .nav-item {
            position: relative;
            display: block;
            padding-left: 1rem;
            transition: transform 0.4s ease;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0%;
            background-color: var(--jade-accent);
            transition: height 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        a:hover .nav-item { transform: translateX(10px); }
        a:hover .nav-item::before { height: 100%; }
        a:hover .nav-cn { color: var(--ink-dark); }
        .nav-cn {
            color: var(--ink-medium);
            transition: color 0.4s ease;
            font-size: 1.25rem;
            letter-spacing: 0.2em;
            font-style: italic;
        }
        .nav-item.active { transform: translateX(10px); }
        .nav-item.active::before { height: 100%; }
        .nav-item.active .nav-cn { color: var(--ink-dark); }

        /* ── right panel ── */
        .right-panel {
            flex: 1;
            background: url('background.jpg') center center / cover no-repeat;
            border-left: 1px solid rgba(107,142,123,0.12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 72px;
        }

        .clients-heading {
            font-size: 0.72rem;
            letter-spacing: 0.45em;
            color: var(--ink-medium);
            text-transform: uppercase;
            margin-bottom: 52px;
            opacity: 0.7;
        }

        /* ── logo grid ── */
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            width: 100%;
            max-width: 680px;
            background: rgba(107,142,123,0.2);
            border: 1px solid rgba(107,142,123,0.2);
        }

        .logo-cell {
            background: rgba(247, 246, 242, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 44px 32px;
            transition: background 0.3s ease;
            cursor: default;
            opacity: 0;
            animation: cellIn 0.5s ease forwards;
        }
        .logo-cell:hover { background: rgba(247, 246, 242, 0.88); }

        .logo-cell:nth-child(1) { animation-delay: 0.05s; }
        .logo-cell:nth-child(2) { animation-delay: 0.10s; }
        .logo-cell:nth-child(3) { animation-delay: 0.15s; }
        .logo-cell:nth-child(4) { animation-delay: 0.20s; }
        .logo-cell:nth-child(5) { animation-delay: 0.25s; }
        .logo-cell:nth-child(6) { animation-delay: 0.30s; }
        .logo-cell:nth-child(7) { animation-delay: 0.35s; }
        .logo-cell:nth-child(8) { animation-delay: 0.40s; }
        .logo-cell:nth-child(9) { animation-delay: 0.45s; }

        @keyframes cellIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            max-height: 48px;
            max-width: 130px;
            width: auto;
            object-fit: contain;
            opacity: 0.6;
            filter: saturate(0);
            transition: opacity 0.3s ease, filter 0.3s ease;
        }
        .logo-cell:hover .logo-img {
            opacity: 1;
            filter: saturate(1);
        }

        .clients-note {
            margin-top: 40px;
            font-size: 0.78rem;
            letter-spacing: 0.3em;
            color: var(--ink-light);
            font-style: italic;
        }

        /* ── responsive ── */
        @media (max-width: 768px) {
            .page { flex-direction: column; }
            .left-panel {
                width: 100%;
                height: auto;
                position: relative;
                padding: 32px 28px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .left-panel nav {
                flex-direction: row !important;
                gap: 20px !important;
                margin: 0 !important;
            }
            .right-panel { padding: 48px 28px; align-items: center; }
            .logo-grid { grid-template-columns: repeat(2, 1fr); }
            .clients-note { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="page">

        <!-- LEFT PANEL -->
        <aside class="left-panel">
            <div>
                <a href="index.html" style="text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:1.5rem; letter-spacing:0.08em; color:var(--ink-dark); display:block; transition:opacity 0.2s;" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='1'">the first three</a>
            </div>

            <nav style="display:flex; flex-direction:column; gap:40px; margin: auto 0 auto 16px;">
                <a href="clients.html" style="text-decoration:none; display:block;">
                    <div class="nav-item active">
                        <div class="nav-cn">Clients</div>
                    </div>
                </a>
                <a href="services.html" style="text-decoration:none; display:block;">
                    <div class="nav-item">
                        <div class="nav-cn">Services</div>
                    </div>
                </a>
                <a href="about.html" style="text-decoration:none; display:block;">
                    <div class="nav-item">
                        <div class="nav-cn">About</div>
                    </div>
                </a>
            </nav>

            <div></div>
        </aside>

        <!-- RIGHT PANEL -->
        <main class="right-panel">
            <div class="clients-heading">Our Clients</div>

            <div class="logo-grid">
                <div class="logo-cell"><img src="logos/logo our place.svg" alt="Our Place" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo svdpla.svg" alt="SVDPLA" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo athena.svg" alt="Athena" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo jiang.svg" alt="Jiang" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo germanikure.svg" alt="Germanikure" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo compostic.svg" alt="Compostic" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo cicada 2.svg" alt="Cicada" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo Prime Roots .svg" alt="Prime Roots" class="logo-img"></div>
                <div class="logo-cell"><img src="logos/logo osmo.svg" alt="Osmo" class="logo-img"></div>

            </div>

            <div class="clients-note">a selection of brands we've had the privilege of working with</div>
        </main>

    </div>

</body>
</html>
