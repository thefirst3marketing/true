        .splash-text {

        #app-container {

        #app-container.visible {

        .overlapping-title {

        .nav-item {

        .nav-item::before {

        .nav-group:hover .nav-item {

        .nav-group:hover .nav-item::before {

        .nav-group:hover .nav-cn {

        #canvas-panel {

<body vid="10">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" vid="34"></script>
    <script vid="35">
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const content = document.getElementById('app-container');
                
                splash.classList.add('fade-out');
                content.classList.add('visible');
            }, 3000); 
        });

        
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        
        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            varying vec2 vUv;

            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
            float snoise(vec2 v){
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod(i, 289.0);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m; m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            float fbm(vec2 st) {
                float value = 0.0;
                float amplitude = 0.5;
                for (int i = 0; i < 6; i++) {
                    value += amplitude * snoise(st);
                    st *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                st.x *= u_resolution.x / u_resolution.y;
                float time = u_time * 0.04;
                
                // Flow dynamics
                vec2 q = vec2(fbm(st + vec2(time)), fbm(st + vec2(1.0)));
                vec2 r = vec2(fbm(st + 1.2*q + vec2(1.7,9.2)+ 0.15*time), fbm(st + 1.2*q + vec2(8.3,2.8)+ 0.126*time));
                float f = fbm(st + r);

                // Jade Color Palette
                vec3 colorBase = vec3(0.92, 0.94, 0.91);  // Very light celadon/paper
                vec3 colorDeep = vec3(0.42, 0.55, 0.48);  // Deep jade
                vec3 colorMid = vec3(0.65, 0.75, 0.70);   // Mid jade/mist
                vec3 colorMist = vec3(0.85, 0.88, 0.86);  // Light mist
                vec3 colorWhite = vec3(0.98, 0.99, 0.98); // Highlight

                // Color mixing
                vec3 color = mix(colorBase, colorMist, clamp((f*f)*3.5, 0.0, 1.0));
                color = mix(color, colorMid, clamp(length(q)*1.2, 0.0, 1.0));
                color = mix(color, colorDeep, clamp(length(r.x)*1.1, 0.0, 1.0) * 0.5);
                
                // Highlights
                float highlight = smoothstep(0.5, 1.0, f);
                color = mix(color, colorWhite, highlight * 0.6);
                
                // Subtle horizontal flow lines simulating brush strokes or water currents
                color -= sin(st.y * 150.0 + time * 10.0) * 0.015;
                color -= sin(st.y * 300.0) * 0.01;

                // Subtle film grain
                float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) * 0.02;
                color -= grain;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
        };

        const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(mesh);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }
        animate();

        
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            uniforms.u_resolution.value.set(width, height);
        });
    </script>
